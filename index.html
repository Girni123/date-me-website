<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F3EDE4" />
    <meta name="description" content="Fuck Dating Apps — wanna meet in real life." />
    <title>Fuck Dating Apps</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="lines" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <main class="stage" id="stage">
      <header class="brand">
        <p class="brand__mark">FUCK DATING</p>
        <p class="brand__mark brand__mark--overlap">APPS<sup>®</sup></p>
      </header>

      <section class="orbit" aria-label="Interaktive Bereiche">
        <button class="hotspot hotspot--tl" type="button" data-panel="datemenu" aria-controls="panel-datemenu">
          <span>DATE MENU</span>
        </button>
        <button class="hotspot hotspot--tr" type="button" data-panel="photos" aria-controls="panel-photos">
          <span>PHOTOS</span>
        </button>

        <div class="hero">
          <div class="hero__stack" id="hero-stack">
            <div class="hero__fallback" id="hero-fallback" aria-hidden="true">
              <span>DEIN<br />FOTO</span>
            </div>
          </div>
          <div class="hero__ring" aria-hidden="true"></div>
        </div>

        <button class="hotspot hotspot--bl" type="button" data-panel="contact" aria-controls="panel-contact">
          <span>CONTACT</span>
        </button>
        <button class="hotspot hotspot--br" type="button" data-panel="about" aria-controls="panel-about">
          <span>ABOUT</span>
        </button>
      </section>

      <p class="subline">WANNA MEET IN REAL LIFE</p>

      <div class="cta" id="cta">
        <p class="cta__headline" id="cta-headline"></p>
        <p class="cta__text" id="cta-text"></p>
        <button class="cta__btn" type="button" data-panel="contact">Schreib mir →</button>
      </div>

      <p class="hint" id="hint">tipp die labels</p>
    </main>

    <div class="scrim" id="scrim" hidden></div>

    <aside class="panel" id="panel-about" role="dialog" aria-modal="true" aria-labelledby="about-title" hidden>
      <div class="panel__handle" aria-hidden="true"></div>
      <button class="panel__close" type="button" data-close aria-label="Schließen">×</button>
      <h2 id="about-title" class="panel__title">ABOUT</h2>
      <p class="panel__body" id="about-text"></p>
      <p class="panel__meta" id="about-name"></p>
    </aside>

    <aside class="panel" id="panel-photos" role="dialog" aria-modal="true" aria-labelledby="photos-title" hidden>
      <div class="panel__handle" aria-hidden="true"></div>
      <button class="panel__close" type="button" data-close aria-label="Schließen">×</button>
      <h2 id="photos-title" class="panel__title">PHOTOS</h2>
      <div class="gallery" id="gallery"></div>
      <div class="gallery__dots" id="gallery-dots"></div>
    </aside>

    <aside class="panel" id="panel-contact" role="dialog" aria-modal="true" aria-labelledby="contact-title" hidden>
      <div class="panel__handle" aria-hidden="true"></div>
      <button class="panel__close" type="button" data-close aria-label="Schließen">×</button>
      <h2 id="contact-title" class="panel__title">CONTACT</h2>
      <p class="panel__body">Schreib mir — oder stalk erstmal ganz legal.</p>
      <nav class="contact-list" aria-label="Social Links">
        <a class="contact-link" id="link-instagram" href="#" target="_blank" rel="noopener noreferrer">
          <span class="contact-link__label">Instagram</span>
          <span class="contact-link__arrow">→</span>
        </a>
        <a class="contact-link" id="link-linkedin" href="#" target="_blank" rel="noopener noreferrer">
          <span class="contact-link__label">LinkedIn</span>
          <span class="contact-link__arrow">→</span>
        </a>
        <a class="contact-link" id="link-strava" href="#" target="_blank" rel="noopener noreferrer">
          <span class="contact-link__label">Strava</span>
          <span class="contact-link__arrow">→</span>
        </a>
      </nav>
    </aside>

    <aside class="panel" id="panel-datemenu" role="dialog" aria-modal="true" aria-labelledby="datemenu-title" hidden>
      <div class="panel__handle" aria-hidden="true"></div>
      <button class="panel__close" type="button" data-close aria-label="Schließen">×</button>
      <h2 id="datemenu-title" class="panel__title">DATE MENU</h2>
      <div class="date-menu" id="date-menu-content"></div>
    </aside>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
